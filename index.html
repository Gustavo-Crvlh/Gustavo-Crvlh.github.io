<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gustavo Cardoso | Portfólio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d1117;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:50px;
flex-wrap:wrap;
margin-top:50px;
}

.foto img{
width:250px;
height:250px;
border-radius:50%;
object-fit:cover;
border:3px solid #2ea043;
box-shadow:0 0 30px #2ea04355;
}

.texto h1{
font-size:70px;
}

.texto span{
color:#2ea043;
}

.texto p{
font-size:22px;
margin-top:15px;
color:#c9d1d9;
}

.redes{
margin-top:25px;
}

.redes a{
color:white;
font-size:35px;
margin-right:20px;
transition:0.3s;
}

.redes a:hover{
color:#2ea043;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
margin-top:80px;
flex-wrap:wrap;
}

.card{
background:#161b22;
padding:40px;
width:300px;
border-radius:20px;
text-align:center;
border:1px solid #30363d;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
border-color:#2ea043;
}

.card i{
font-size:50px;
color:#2ea043;
margin-bottom:20px;
}

.card h2{
margin-bottom:15px;
}

.card p{
color:#c9d1d9;
margin-bottom:25px;
}

.botao{
display:inline-block;
padding:15px 30px;
background:#2ea043;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.botao:hover{
background:#238636;
}

.tecnologias{
margin-top:100px;
text-align:center;
}

.tecnologias h2{
margin-bottom:40px;
font-size:40px;
}

.tech-icons{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
font-size:60px;
}

.tech-icons i{
transition:0.3s;
}

.tech-icons i:hover{
color:#2ea043;
transform:scale(1.1);
}

footer{
margin-top:100px;
text-align:center;
color:#8b949e;
padding-bottom:30px;
}

@media(max-width:768px){

.texto h1{
font-size:45px;
text-align:center;
}

.texto p{
text-align:center;
}

.redes{
text-align:center;
}

}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<div class="foto">
<img src="foto.jpeg">
</div>

<div class="texto">

<p>
Estudante de Ciências da Computação
</p>

<div class="redes">

</a>

<a href="https://www.instagram.com/gustacvlh_?igsh=cGZhanhsM2Iya3c0&utm_source=qr" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://github.com/Gustavo-Crvlh/" target="_blank">
<i class="fab fa-github"></i>
</a>

</div>

</div>

</div>

<div class="cards">

<div class="card">
<i class="fas fa-globe"></i>

<h2>Meu Site</h2>

<p>
Conheça meu site profissional
</p>

<a class="botao"
href="https://sites.google.com/view/profissionalhub?usp=sharing"
target="_blank">

Acessar
</a>

</div>

<div class="card">

<i class="fas fa-file-pdf"></i>

<h2>Currículo</h2>

<p>
Baixe meu currículo em PDF
</p>

<a class="botao"
href="curriculo.pdf"
target="_blank">

Baixar
</a>

</div>

<div class="card">

<i class="fas fa-file-powerpoint"></i>

<h2>Apresentação</h2>

<p>
Veja minha apresentação

<a class="botao"
href="apresentacao.pptx"

</div>

</div>

<div class="tecnologias">

<div class="tech-icons">

</div>

<footer>

</div>
